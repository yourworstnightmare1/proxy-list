<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proxy list</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #6cb3ff;
      --ok: #3ecf8e;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.35rem; }
    .sub { color: var(--muted); font-size: 0.9rem; }
    .layout {
      display: grid;
      grid-template-columns: minmax(260px, 300px) 1fr;
      gap: 0;
      min-height: calc(100vh - 88px);
    }
    @media (max-width: 840px) {
      .layout { grid-template-columns: 1fr; }
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 1rem 1.25rem;
      background: #121920;
    }
    @media (max-width: 840px) {
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }
    label[for="q"] { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type="search"] {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    input[type="search"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    fieldset {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0 0 1rem;
      padding: 0.65rem 0.75rem;
    }
    legend { font-size: 0.8rem; color: var(--muted); padding: 0 0.35rem; }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .tag {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .tag input { margin: 0; accent-color: var(--accent); }
    .tag:hover { border-color: var(--muted); }
    .match-mode {
      display: flex;
      gap: 0.75rem;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }
    .match-mode label { text-transform: none; font-size: 0.85rem; color: var(--text); margin: 0; display: flex; align-items: center; gap: 0.35rem; }
    main { padding: 1rem 1.25rem 2rem; overflow-x: auto; }
    .stats { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
    .stats strong { color: var(--ok); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      text-align: left;
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 500;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
    }
    a { color: var(--accent); word-break: break-all; }
    .empty { color: var(--muted); padding: 2rem; text-align: center; }
    .err { color: #ff8a8a; padding: 1rem; }
    .pill {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      background: #243044;
      color: var(--muted);
      margin-right: 0.25rem;
    }
    .hint {
      margin: 0 0 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Proxy list</h1>
    <p class="sub">Multi-select provider, category, protocol, and capability tags (parsed from <code>list.md</code>). Nothing checked means no filter on that group.</p>
  </header>
  <div class="layout">
    <aside>
      <label for="q">Search</label>
      <input type="search" id="q" placeholder="URL, provider, contributor…" autocomplete="off" />

      <fieldset>
        <legend>Provider</legend>
        <p class="hint">Any checked</p>
        <div class="tags" id="providerTags"></div>
      </fieldset>

      <fieldset>
        <legend>Category</legend>
        <p class="hint">Any checked</p>
        <div class="tags" id="categoryTags"></div>
      </fieldset>

      <fieldset>
        <legend>Protocol</legend>
        <p class="hint">Row lists any checked tag</p>
        <div class="tags" id="protocolTags"></div>
      </fieldset>

      <fieldset>
        <legend>Capabilities</legend>
        <div class="match-mode">
          <label><input type="radio" name="capMode" value="any" checked /> Any selected</label>
          <label><input type="radio" name="capMode" value="all" /> All selected</label>
        </div>
        <div class="tags" id="capTags"></div>
      </fieldset>
    </aside>
    <main>
      <div class="stats" id="stats"></div>
      <div id="tableWrap"></div>
    </main>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);

    function uniq(arr) {
      return [...new Set(arr)].filter(Boolean).sort((a, b) => a.localeCompare(b));
    }

    function haystack(row) {
      return [
        row.link,
        row.provider,
        row.category,
        row.capabilities,
        row.protocols,
        row.contributor,
        row.found,
      ].join(" ").toLowerCase();
    }

    function selectedCaps() {
      return [...document.querySelectorAll("#capTags input:checked")].map((i) => i.value);
    }

    function selectedIn(containerId) {
      return [...document.querySelectorAll("#" + containerId + " input:checked")].map((i) => i.value);
    }

    function capMode() {
      const m = document.querySelector('input[name="capMode"]:checked');
      return m ? m.value : "any";
    }

    function rowMatchesCaps(row, selected) {
      if (!selected.length) return true;
      const tags = new Set(row.capability_tags || []);
      if (capMode() === "all") {
        return selected.every((s) => tags.has(s));
      }
      return selected.some((s) => tags.has(s));
    }

    function render(data) {
      const q = $("q").value.trim().toLowerCase();
      const providers = selectedIn("providerTags");
      const categories = selectedIn("categoryTags");
      const protocols = selectedIn("protocolTags");
      const caps = selectedCaps();

      const filtered = data.filter((row) => {
        if (providers.length && !providers.includes(row.provider)) return false;
        if (categories.length && !categories.includes(row.category)) return false;
        if (protocols.length) {
          const pt = row.protocol_tags || [];
          if (!protocols.some((p) => pt.includes(p))) return false;
        }
        if (!rowMatchesCaps(row, caps)) return false;
        if (q && !haystack(row).includes(q)) return false;
        return true;
      });

      $("stats").innerHTML =
        "Showing <strong>" + filtered.length + "</strong> of <strong>" + data.length + "</strong> links.";

      if (!filtered.length) {
        $("tableWrap").innerHTML = '<p class="empty">No links match these filters.</p>';
        return;
      }

      const rowsHtml = filtered
        .map(
          (r) =>
            "<tr><td>" +
            escapeHtml(r.provider) +
            '</td><td><a href="' +
            escapeAttr(r.link) +
            '" rel="noopener noreferrer" target="_blank">' +
            escapeHtml(r.link) +
            "</a></td><td>" +
            escapeHtml(r.category) +
            "</td><td>" +
            formatTags(r.capability_tags) +
            "</td><td>" +
            formatTags(r.protocol_tags) +
            "</td><td>" +
            escapeHtml(r.contributor) +
            "</td></tr>"
        )
        .join("");

      $("tableWrap").innerHTML =
        "<table><thead><tr>" +
        ["Provider", "Link", "Category", "Capabilities", "Protocols", "Contributor"]
          .map((h) => "<th>" + h + "</th>")
          .join("") +
        "</tr></thead><tbody>" +
        rowsHtml +
        "</tbody></table>";
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function formatTags(tags) {
      if (!tags || !tags.length) return '<span class="pill">—</span>';
      return tags.map((t) => '<span class="pill">' + escapeHtml(t) + "</span>").join("");
    }

    function buildCheckboxGroup(containerId, values, data) {
      const wrap = $(containerId);
      wrap.innerHTML = "";
      for (const v of values) {
        const lab = document.createElement("label");
        lab.className = "tag";
        const inp = document.createElement("input");
        inp.type = "checkbox";
        inp.value = v;
        inp.addEventListener("change", () => render(data));
        lab.appendChild(inp);
        lab.appendChild(document.createTextNode(v));
        wrap.appendChild(lab);
      }
    }

    function buildCapCheckboxes(data) {
      buildCheckboxGroup("capTags", uniq(data.flatMap((r) => r.capability_tags || [])), data);
    }

    fetch("data.json")
      .then((r) => {
        if (!r.ok) throw new Error("Could not load data.json (" + r.status + ")");
        return r.json();
      })
      .then((data) => {
        buildCheckboxGroup("providerTags", uniq(data.map((d) => d.provider)), data);
        buildCheckboxGroup("categoryTags", uniq(data.map((d) => d.category)), data);
        buildCheckboxGroup(
          "protocolTags",
          uniq(data.flatMap((d) => d.protocol_tags || [])),
          data
        );
        buildCapCheckboxes(data);

        $("q").addEventListener("input", () => render(data));
        document.querySelectorAll('input[name="capMode"]').forEach((el) => {
          el.addEventListener("change", () => render(data));
        });

        render(data);
      })
      .catch((e) => {
        $("tableWrap").innerHTML =
          '<p class="err">Failed to load data. Open this page via GitHub Pages or a local server so <code>data.json</code> can load (file:// blocks fetch).<br><br>' +
          escapeHtml(e.message) +
          "</p>";
      });
  </script>
</body>
</html>
