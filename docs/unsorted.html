<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unsorted links</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #6cb3ff;
      --ok: #3ecf8e;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 1.2rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.3rem; }
    .sub { color: var(--muted); margin: 0; font-size: 0.9rem; }
    .actions { margin-top: 0.8rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.42rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.83rem;
      background: #121920;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    main { padding: 1rem 1.4rem 2rem; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 0.9rem;
      align-items: end;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 220px;
      flex: 1;
    }
    .control label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .control input,
    .control select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
    }
    .control input:focus,
    .control select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .stats { color: var(--muted); margin-bottom: 1rem; font-size: 0.9rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      text-align: left;
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; }
    a { color: var(--accent); word-break: break-all; }
    .empty { color: var(--muted); padding: 1rem 0; }
    .err { color: #ff8a8a; }

    .orientation-warning {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.5rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .orientation-warning .orientation-icon {
      width: 96px;
      height: auto;
      margin-bottom: 1rem;
      color: var(--accent);
      animation: orientation-rotate 2.4s ease-in-out infinite;
    }
    @keyframes orientation-rotate {
      0%, 35% { transform: rotate(0deg); }
      55%, 100% { transform: rotate(-90deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .orientation-warning .orientation-icon {
        animation: none;
        transform: rotate(-90deg);
      }
    }
    .orientation-warning h2 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }
    .orientation-warning p {
      margin: 0;
      color: var(--muted);
      max-width: 28ch;
      line-height: 1.5;
    }
    @media (max-width: 768px) and (orientation: portrait) {
      .orientation-warning { display: flex; }
      body.orientation-locked {
        overflow: hidden;
        height: 100vh;
      }
      body.orientation-locked > :not(.orientation-warning) {
        display: none !important;
      }
    }
    #contentLoadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      align-items: center;
      justify-content: center;
      background: rgba(15, 20, 25, 0.78);
      backdrop-filter: blur(2px);
    }
    #contentLoadingOverlay.open {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
    }
    #contentLoadingOverlay img {
      width: min(100px, 26vw);
      height: auto;
      display: block;
    }
    .content-loading-msg {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body class="orientation-locked">
  <div class="orientation-warning" role="alertdialog" aria-labelledby="orientationTitle">
    <svg class="orientation-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.88 106.43" aria-hidden="true" focusable="false">
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M11.1,0h35.63c3.05,0,5.85,1.25,7.85,3.25c2.03,2.03,3.25,4.8,3.25,7.85v31.46h-3.19V12.18H3.15v75.26l0,0h7.61v11.61c0,1.58,0.27,3.1,0.77,4.51H11.1c-3.05,0-5.85-1.25-7.85-3.25C1.22,98.27,0,95.51,0,92.45V11.1c0-3.05,1.25-5.85,3.25-7.85C5.28,1.22,8.04,0,11.1,0L11.1,0L11.1,0z M94.95,33.45c-0.37-5.8-2.64-10.56-6.06-13.97c-3.64-3.63-8.59-5.74-13.94-5.93l2.46,2.95c0.73,0.88,0.62,2.18-0.26,2.91c-0.88,0.73-2.18,0.62-2.91-0.26l-5.72-6.85l0,0c-0.72-0.86-0.62-2.14,0.22-2.88l6.71-5.89c0.86-0.75,2.16-0.66,2.91,0.19c0.75,0.86,0.66,2.16-0.19,2.91l-3.16,2.78c6.43,0.21,12.4,2.75,16.8,7.13c4.07,4.06,6.79,9.69,7.25,16.49l2.58-3.08c0.73-0.88,2.04-0.99,2.91-0.26c0.88,0.73,0.99,2.04,0.26,2.91l-5.73,6.84c-0.72,0.86-1.99,0.99-2.87,0.29l-6.98-5.56c-0.89-0.71-1.04-2.01-0.33-2.91c0.71-0.89,2.01-1.04,2.91-0.33L94.95,33.45L94.95,33.45z M122.88,59.7v35.63c0,3.05-1.25,5.85-3.25,7.85c-2.03,2.03-4.8,3.25-7.85,3.25h-78.9c-3.05,0-5.85-1.25-7.85-3.25c-2.03-2.03-3.25-4.8-3.25-7.85V59.7c0-3.05,1.25-5.85,3.25-7.85c2.03-2.03,4.79-3.25,7.85-3.25h78.9c3.05,0,5.85,1.25,7.85,3.25C121.66,53.88,122.88,56.64,122.88,59.7L122.88,59.7L122.88,59.7z M35.41,77.49c0,2.51-2.03,4.57-4.57,4.57c-2.51,0-4.57-2.03-4.57-4.57c0-2.51,2.03-4.57,4.57-4.57C33.36,72.92,35.41,74.95,35.41,77.49L35.41,77.49L35.41,77.49z M37.88,51.75v51.49h72.82V51.75H37.88L37.88,51.75z"/>
    </svg>
    <h2 id="orientationTitle">Please rotate your device</h2>
    <p>This site must be viewed in landscape mode to display properly.</p>
  </div>
  <div id="contentLoadingOverlay" aria-hidden="true" role="status">
    <img src="loading-spinner.gif" width="80" height="80" alt="" decoding="async" />
    <p class="content-loading-msg">Getting data...</p>
  </div>
  <header>
    <h1>Unsorted links</h1>
    <p class="sub">Temporary holding area for links that do not have a confirmed provider section yet.</p>
    <div class="actions">
      <a class="btn" href="./index.html">Back to sorted links</a>
      <a class="btn" href="https://github.com/yourworstnightmare1/proxy-list/blob/main/unsorted.md" rel="noopener noreferrer" target="_blank">Edit unsorted source</a>
    </div>
  </header>
  <main>
    <div class="controls">
      <div class="control">
        <label for="q">Search</label>
        <input type="search" id="q" placeholder="Filter links or domains..." autocomplete="off" />
      </div>
      <div class="control">
        <label for="sortMode">Sort</label>
        <select id="sortMode">
          <option value="none">Original order</option>
          <option value="domain-asc">Domain (A-Z)</option>
          <option value="domain-desc">Domain (Z-A)</option>
        </select>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div id="tableWrap"></div>
  </main>
  <script
    src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
    integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
    crossorigin="anonymous"
  ></script>
  <script>
    const stats = document.getElementById("stats");
    const tableWrap = document.getElementById("tableWrap");
    const q = document.getElementById("q");
    const sortMode = document.getElementById("sortMode");
    const contentLoadingOverlay = document.getElementById("contentLoadingOverlay");
    let allLinks = [];

    function setHtml(el, html) {
      if (!el) return;
      const raw = html == null ? "" : String(html);
      el.innerHTML = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;
    }

    function setContentLoading(on) {
      if (!contentLoadingOverlay) return;
      contentLoadingOverlay.classList.toggle("open", on);
      contentLoadingOverlay.setAttribute("aria-hidden", on ? "false" : "true");
    }

    function waitNextPaint() {
      return new Promise((resolve) => {
        requestAnimationFrame(() => {
          requestAnimationFrame(resolve);
        });
      });
    }

    async function renderAfterSortChange() {
      setContentLoading(true);
      await waitNextPaint();
      try {
        render();
      } finally {
        setContentLoading(false);
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function safeDomain(link) {
      try {
        return new URL(link).hostname.toLowerCase();
      } catch (_) {
        return "";
      }
    }

    function getFilteredAndSortedRows() {
      const query = q.value.trim().toLowerCase();
      const mode = sortMode.value;
      const rows = allLinks
        .filter((link) => {
          if (!query) return true;
          return link.toLowerCase().includes(query) || safeDomain(link).includes(query);
        })
        .map((link) => ({ link, domain: safeDomain(link) }));

      if (mode === "domain-asc" || mode === "domain-desc") {
        const direction = mode === "domain-asc" ? 1 : -1;
        rows.sort((a, b) => {
          const domainCmp = a.domain.localeCompare(b.domain);
          if (domainCmp !== 0) return domainCmp * direction;
          return a.link.localeCompare(b.link) * direction;
        });
      }

      return rows;
    }

    function render() {
      const rowsData = getFilteredAndSortedRows();
      setHtml(
        stats,
        'Showing <strong>' +
          rowsData.length +
          '</strong> of <strong>' +
          allLinks.length +
          "</strong> unsorted links."
      );

      if (!rowsData.length) {
        setHtml(tableWrap, '<p class="empty">No unsorted links match your search/filter.</p>');
        return;
      }

      const rows = rowsData
        .map((r) => {
          return (
            "<tr><td>" +
            escapeHtml(r.domain || "—") +
            "</td><td><a href=\"" +
            escapeAttr(r.link) +
            '" rel="noopener noreferrer" target="_blank">' +
            escapeHtml(r.link) +
            "</a></td></tr>"
          );
        })
        .join("");
      setHtml(
        tableWrap,
        "<table><thead><tr><th>Domain</th><th>Link</th></tr></thead><tbody>" + rows + "</tbody></table>"
      );
    }

    fetch("unsorted.json")
      .then((r) => {
        if (!r.ok) throw new Error("Could not load unsorted.json (" + r.status + ")");
        return r.json();
      })
      .then((payload) => {
        const links = Array.isArray(payload) ? payload : (payload.links || []);
        if (!links.length) {
          setHtml(stats, "Unsorted links: <strong>0</strong>");
          setHtml(tableWrap, '<p class="empty">No unsorted links right now.</p>');
          return;
        }
        allLinks = links.map((r) => (typeof r === "string" ? r : r.link)).filter(Boolean);
        q.addEventListener("input", render);
        sortMode.addEventListener("change", () => {
          void renderAfterSortChange();
        });
        render();
      })
      .catch((e) => {
        setHtml(tableWrap, '<p class="err">' + escapeHtml(e.message) + "</p>");
      });
  </script>
</body>
</html>
