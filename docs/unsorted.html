<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unsorted links</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #6cb3ff;
      --ok: #3ecf8e;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 1.2rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    h1 { margin: 0 0 0.35rem; font-size: 1.3rem; }
    .sub { color: var(--muted); margin: 0; font-size: 0.9rem; }
    .actions { margin-top: 0.8rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.42rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.83rem;
      background: #121920;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    main { padding: 1rem 1.4rem 2rem; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 0.9rem;
      align-items: end;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 220px;
      flex: 1;
    }
    .control label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .control input,
    .control select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
    }
    .control input:focus,
    .control select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .stats { color: var(--muted); margin-bottom: 1rem; font-size: 0.9rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th, td {
      text-align: left;
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; }
    a { color: var(--accent); word-break: break-all; }
    .empty { color: var(--muted); padding: 1rem 0; }
    .err { color: #ff8a8a; }
  </style>
</head>
<body>
  <header>
    <h1>Unsorted links</h1>
    <p class="sub">Temporary holding area for links that do not have a confirmed provider section yet.</p>
    <div class="actions">
      <a class="btn" href="./index.html">Back to sorted links</a>
      <a class="btn" href="https://github.com/yourworstnightmare1/proxy-list/blob/main/unsorted.md" rel="noopener noreferrer" target="_blank">Edit unsorted source</a>
    </div>
  </header>
  <main>
    <div class="controls">
      <div class="control">
        <label for="q">Search</label>
        <input type="search" id="q" placeholder="Filter links or domains..." autocomplete="off" />
      </div>
      <div class="control">
        <label for="sortMode">Sort</label>
        <select id="sortMode">
          <option value="none">Original order</option>
          <option value="domain-asc">Domain (A-Z)</option>
          <option value="domain-desc">Domain (Z-A)</option>
        </select>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div id="tableWrap"></div>
  </main>
  <script>
    const stats = document.getElementById("stats");
    const tableWrap = document.getElementById("tableWrap");
    const q = document.getElementById("q");
    const sortMode = document.getElementById("sortMode");
    let allLinks = [];

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function safeDomain(link) {
      try {
        return new URL(link).hostname.toLowerCase();
      } catch (_) {
        return "";
      }
    }

    function getFilteredAndSortedRows() {
      const query = q.value.trim().toLowerCase();
      const mode = sortMode.value;
      const rows = allLinks
        .filter((link) => {
          if (!query) return true;
          return link.toLowerCase().includes(query) || safeDomain(link).includes(query);
        })
        .map((link) => ({ link, domain: safeDomain(link) }));

      if (mode === "domain-asc" || mode === "domain-desc") {
        const direction = mode === "domain-asc" ? 1 : -1;
        rows.sort((a, b) => {
          const domainCmp = a.domain.localeCompare(b.domain);
          if (domainCmp !== 0) return domainCmp * direction;
          return a.link.localeCompare(b.link) * direction;
        });
      }

      return rows;
    }

    function render() {
      const rowsData = getFilteredAndSortedRows();
      stats.innerHTML =
        'Showing <strong>' +
        rowsData.length +
        '</strong> of <strong>' +
        allLinks.length +
        "</strong> unsorted links.";

      if (!rowsData.length) {
        tableWrap.innerHTML = '<p class="empty">No unsorted links match your search/filter.</p>';
        return;
      }

      const rows = rowsData
        .map((r) => {
          return (
            "<tr><td>" +
            escapeHtml(r.domain || "—") +
            "</td><td><a href=\"" +
            escapeAttr(r.link) +
            '" rel="noopener noreferrer" target="_blank">' +
            escapeHtml(r.link) +
            "</a></td></tr>"
          );
        })
        .join("");
      tableWrap.innerHTML = "<table><thead><tr><th>Domain</th><th>Link</th></tr></thead><tbody>" + rows + "</tbody></table>";
    }

    fetch("unsorted.json")
      .then((r) => {
        if (!r.ok) throw new Error("Could not load unsorted.json (" + r.status + ")");
        return r.json();
      })
      .then((payload) => {
        const links = Array.isArray(payload) ? payload : (payload.links || []);
        if (!links.length) {
          stats.innerHTML = "Unsorted links: <strong>0</strong>";
          tableWrap.innerHTML = '<p class="empty">No unsorted links right now.</p>';
          return;
        }
        allLinks = links.map((r) => (typeof r === "string" ? r : r.link)).filter(Boolean);
        q.addEventListener("input", render);
        sortMode.addEventListener("change", render);
        render();
      })
      .catch((e) => {
        tableWrap.innerHTML = '<p class="err">' + escapeHtml(e.message) + "</p>";
      });
  </script>
</body>
</html>
