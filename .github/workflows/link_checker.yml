name: Auto Update Proxy Links

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug commit
        run: echo "Commit: $GITHUB_SHA"

      - name: Debug script
        run: head -n 20 scripts/link_checker.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # 🔥 CRITICAL FIX: allow script to fail but continue
      - name: Run link checker
        run: |
          echo "Running script..."
          set +e
          python scripts/link_checker.py
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          set -e

      # 🔥 Show if file exists
      - name: Debug commit_info
        run: |
          if [ -f commit_info.txt ]; then
            echo "commit_info.txt found:"
            cat commit_info.txt
          else
            echo "commit_info.txt NOT FOUND"
          fi

      # 🔥 SAFE read (never crashes)
      - name: Read commit info
        id: commitinfo
        run: |
          if [ -f commit_info.txt ]; then
            IFS="|" read version revision removed total < commit_info.txt
          else
            version="v0.0.0"
            revision="r0"
            removed="0"
            total="0"
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "revision=$revision" >> $GITHUB_OUTPUT
          echo "removed=$removed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT

      - name: Commit changes
        run: |
          git config --global user.name "auto-link-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add *.md

          if ! git diff --cached --quiet; then
            git commit -m "${{ steps.commitinfo.outputs.version }}${{ steps.commitinfo.outputs.revision }} | purged ${{ steps.commitinfo.outputs.removed }} dead links, link count: ${{ steps.commitinfo.outputs.total }}"
            git push
          else
            echo "No changes to commit"
          fi
