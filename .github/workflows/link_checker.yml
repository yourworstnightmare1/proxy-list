name: Auto Update Proxy Links

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "list.md"
      - "unsorted.md"
      - "scripts/link_checker.py"
      - "scripts/convert_list_to_json.py"
      - "scripts/update_link_check_meta.py"

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug commit
        run: |
          echo "Commit: $GITHUB_SHA"

      - name: Debug script
        run: |
          head -n 20 scripts/link_checker.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run link checker
        run: |
          echo "Running script..."
          set +e
          python scripts/link_checker.py
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          set -e

      - name: Export web data
        run: |
          python scripts/update_link_check_meta.py
          python scripts/convert_list_to_json.py

      - name: Debug commit_info
        run: |
          if test -f commit_info.txt; then
            echo "commit_info.txt contents:"
            cat commit_info.txt
          else
            echo "commit_info.txt NOT FOUND"
          fi

      # Pipe-separated commit_info.txt — parse with Python (robust vs CRLF / awk edge cases)
      - name: Read commit info
        id: commitinfo
        shell: bash
        run: |
          python3 << 'PY'
          import os
          from pathlib import Path

          version = revision = removed = total = None
          defaults = ("v0.0.0", "r0", "0", "0")

          p = Path("commit_info.txt")
          if p.is_file():
              raw = p.read_text(encoding="utf-8").strip().replace("\r\n", "\n").replace("\r", "\n")
              parts = [x.strip() for x in raw.split("|")]
              if len(parts) >= 4:
                  version, revision, removed, total = parts[0], parts[1], parts[2], parts[3]
                  print("commit_info:", version, revision, removed, total)
              else:
                  print("commit_info.txt malformed, fields:", len(parts))
          else:
              print("commit_info.txt NOT FOUND")

          version = version or defaults[0]
          revision = revision or defaults[1]
          removed = removed or defaults[2]
          total = total or defaults[3]

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as f:
              f.write(f"version={version}\n")
              f.write(f"revision={revision}\n")
              f.write(f"removed={removed}\n")
              f.write(f"total={total}\n")
          PY

      - name: Commit changes
        run: |
          git config --global user.name "auto-link-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add *.md docs/data.json docs/unsorted.json docs/link_check_meta.json docs/link_check_snapshot.json link_status.json

          if ! git diff --cached --quiet; then
            git commit -m "${{ steps.commitinfo.outputs.version }} ${{ steps.commitinfo.outputs.revision }} | purged ${{ steps.commitinfo.outputs.removed }} dead links, link count: ${{ steps.commitinfo.outputs.total }}"
            git push
          else
            echo "No changes to commit"
          fi
