name: Auto Update Proxy Links

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "list.md"
      - "unsorted.md"
      - "scripts/link_checker.py"
      - "scripts/convert_list_to_json.py"
      - "scripts/update_link_check_meta.py"

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug commit
        run: |
          echo "Commit: $GITHUB_SHA"

      - name: Debug script
        run: |
          head -n 20 scripts/link_checker.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      # Do not remove rows from list.md here: GitHub-hosted runners are often blocked or
      # get non-2xx from sites that work for real users, which purged hundreds of links.
      # To allow purging from CI, set secret/variable LINK_CHECK_NO_PURGE=false and use caution.
      - name: Run link checker
        env:
          LINK_CHECK_NO_PURGE: "true"
        run: |
          echo "Running script..."
          set +e
          python scripts/link_checker.py
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          set -e

      - name: Export web data
        run: |
          python scripts/update_link_check_meta.py
          python scripts/convert_list_to_json.py

      - name: Debug commit_info
        run: |
          if test -f commit_info.json; then
            echo "commit_info.json:"; cat commit_info.json
          fi
          if test -f commit_info.txt; then
            echo "commit_info.txt:"; cat commit_info.txt
          fi

      # Prefer JSON from link_checker (no pipe/awk ambiguity). Fallback to legacy .txt
      - name: Read commit info
        id: commitinfo
        shell: bash
        run: |
          python3 << 'PY'
          import json
          import os
          from pathlib import Path

          defaults_version, defaults_revision = "v0.0.0", "r0"
          defaults_removed, defaults_total = "0", "0"

          version = revision = None
          removed_str = total_str = None

          jp = Path("commit_info.json")
          if jp.is_file():
              meta = json.loads(jp.read_text(encoding="utf-8"))
              version = meta.get("version")
              revision = meta.get("revision")
              r, t = meta.get("removed"), meta.get("total")
              if r is not None:
                  removed_str = str(r)
              if t is not None:
                  total_str = str(t)
              print("commit_info.json:", version, revision, removed_str, total_str)

          if version is None:
              tp = Path("commit_info.txt")
              if tp.is_file():
                  raw = tp.read_text(encoding="utf-8").strip().replace("\r\n", "\n").replace("\r", "\n")
                  parts = [x.strip() for x in raw.split("|")]
                  if len(parts) >= 4:
                      version, revision = parts[0], parts[1]
                      removed_str, total_str = parts[2], parts[3]

          version = version or defaults_version
          revision = revision or defaults_revision
          removed_str = removed_str if removed_str is not None else defaults_removed
          total_str = total_str if total_str is not None else defaults_total

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as f:
              f.write(f"version={version}\n")
              f.write(f"revision={revision}\n")
              f.write(f"removed={removed_str}\n")
              f.write(f"total={total_str}\n")
          PY

      - name: Commit changes
        run: |
          git config --global user.name "auto-link-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add *.md docs/data.json docs/unsorted.json docs/link_check_meta.json docs/link_check_snapshot.json link_status.json

          if ! git diff --cached --quiet; then
            git commit -m "${{ steps.commitinfo.outputs.version }} ${{ steps.commitinfo.outputs.revision }} | purged ${{ steps.commitinfo.outputs.removed }} dead links, link count: ${{ steps.commitinfo.outputs.total }}"
            git push
          else
            echo "No changes to commit"
          fi
