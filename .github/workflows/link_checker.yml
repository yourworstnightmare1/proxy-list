name: Auto Update Proxy Links

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug commit
        run: |
          echo "Commit: $GITHUB_SHA"

      - name: Debug script
        run: |
          head -n 20 scripts/link_checker.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run link checker
        run: |
          echo "Running script..."
          set +e
          python scripts/link_checker.py
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          set -e

      - name: Debug commit_info
        run: |
          if test -f commit_info.txt; then
            echo "commit_info.txt contents:"
            cat commit_info.txt
          else
            echo "commit_info.txt NOT FOUND"
          fi

      # ✅ FULLY FIXED (never fails)
      - name: Read commit info
        id: commitinfo
        shell: bash
        run: |
          set +e

          echo "Reading commit info..."

          version="v0.0.0"
          revision="r0"
          removed="0"
          total="0"

          if test -f commit_info.txt; then
            echo "commit_info.txt found"
            CONTENT=$(cat commit_info.txt 2>/dev/null)

            if [ -n "$CONTENT" ]; then
              version=$(echo "$CONTENT" | awk -F'|' '{print $1}')
              revision=$(echo "$CONTENT" | awk -F'|' '{print $2}')
              removed=$(echo "$CONTENT" | awk -F'|' '{print $3}')
              total=$(echo "$CONTENT" | awk -F'|' '{print $4}')
            else
              echo "commit_info.txt is empty"
            fi
          else
            echo "commit_info.txt NOT FOUND"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "removed=$removed" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"

          echo "Done reading commit info"

          exit 0

      - name: Commit changes
        run: |
          git config --global user.name "auto-link-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add *.md

          if ! git diff --cached --quiet; then
            git commit -m "${{ steps.commitinfo.outputs.version }}${{ steps.commitinfo.outputs.revision }} | purged ${{ steps.commitinfo.outputs.removed }} dead links, link count: ${{ steps.commitinfo.outputs.total }}"
            git push
          else
            echo "No changes to commit"
          fi
